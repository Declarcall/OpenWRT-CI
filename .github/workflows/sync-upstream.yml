name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0:00 (北京时间早上 8:00) 自动同步一次
  workflow_dispatch: # 允许在 GitHub Action 页面手动点击触发同步

jobs:
  sync:
    name: Sync latest commits from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git
          git fetch upstream main
          git merge upstream/main -m "auto sync from upstream" -X theirs --allow-unrelated-histories || true
          git push origin main
