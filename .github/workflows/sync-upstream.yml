name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0:00 (北京时间早上 8:00) 自动同步一次
  workflow_dispatch: # 允许在 GitHub Action 页面手动点击触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Fork
        run: |
          gh repo sync ${{ github.repository }} -b main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
